<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Blogify</title>
  <link rel="stylesheet" href="profile.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="navbar">
    <div class="logo">thecodeehub</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="posts.html">Posts</a>
      <a href="categories.html">Categories</a>
      <a href="profile.html" class="active">Profile</a>
    </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="profile-container">

    <!-- USER INFO -->
    <section class="profile-card">
      <div class="avatar">A</div>

      <div class="profile-info">
        <h2><strong>Name:</strong> <span id="name"></span></h2>
        <br>
        <p class="email"><strong>Email:</strong> <span id="email"></span></p>
        <p class="about">
          <strong>About:</strong> <span id="about"></span>
        </p>
        <p><strong>Role:</strong> <span id="role"></span></p>

    </section>

    <!-- MY POSTS -->
    <section class="my-posts">
      <div class="posts-header">
        <h3>My Posts</h3>
        <a href="createPost.html" class="create-btn">+ Create Post</a>
      </div>

      <div id="postsContainer"></div>
    
    </section>

  </main>

  
  <script src="profile.js"></script>
</body>
</html>
